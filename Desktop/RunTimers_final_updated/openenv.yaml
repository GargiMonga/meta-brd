=======
  AI-powered compliance monitoring environment.
  Ingests policy PDFs, scans a company database, detects violations,
  explains each one in plain English, ranks by severity, and flags
  policy contradictions. Three graded tasks of increasing difficulty.

tasks:
  - id: task_easy
    name: Single Record Audit
    description: >
      Check one employee record (EMP001) against one rule (RULE001 — background check).
      Binary score: 1.0 if violation found, 0.0 otherwise.
    difficulty: easy
    max_steps: 10

  - id: task_medium
    name: Multi-Record HR Audit
    description: >
      Scan 30 employee records against 4 HR rules. Partial credit scoring.
      Reward detection accuracy and correct severity labelling.
    difficulty: medium
    max_steps: 30

  - id: task_hard
    name: Full Database Audit with Conflicting Policies
    description: >
      Scan all 60 records (employees, contracts, transactions) against 10 rules
      plus 2 conflicting rule pairs. Scored on detection, severity, explanation
      quality, fix suggestions, and conflict resolution.
    difficulty: hard
    max_steps: 100

reward:
  type: shaped
  components:
    flag_violation:
      value: 0.4
      description: Correctly flagging a record+rule violation pair
    assign_severity:
      value: 0.2
      description: Correctly labelling severity (Critical/High/Medium/Low)
    generate_explanation:
      value: 0.2
      description: Generating a meaningful plain-English explanation (>20 chars)
    suggest_fix:
      value: 0.2
      description: Suggesting an actionable fix (starts with action verb, >15 chars)
    resolve_conflict:
      value: 0.2
      description: Documenting a known policy conflict with resolution (>30 chars)
    false_positive_penalty:
      value: -0.1
      description: Penalty per incorrectly flagged record+rule pair

observation_space:
  type: dict
  fields:
    records:
      type: list
      description: Company records (employees, contracts, transactions)
    rules:
      type: list
      description: Active compliance rules
    task_id:
      type: string
      enum: [task_easy, task_medium, task_hard]
    step:
      type: integer
    done:
      type: boolean
    violations:
      type: list
      description: Currently flagged violations in this episode

action_space:
  type: dict
  actions:
    check_record:
      description: Inspect a specific record by ID
      params:
        record_id: string
    flag_violation:
      description: Flag a record as violating a specific rule
      params:
        record_id: string
        rule_id: string
        reason: string
    assign_severity:
      description: Assign severity level to a flagged violation
      params:
        violation_id: string
        severity:
          type: string
          enum: [Low, Medium, High, Critical]
    generate_explanation:
      description: Generate plain-English explanation for a violation
      params:
        violation_id: string
        explanation: string
    suggest_fix:
      description: Suggest a remediation action for a violation
      params:
        violation_id: string
        fix: string
    resolve_conflict:
      description: Document a conflict between two policy rules
      params:
        rule_id_a: string
        rule_id_b: string
        resolution: string

api:
  reset:
    method: POST
    path: /reset
    body:
      task_id:
        type: string
        enum: [task_easy, task_medium, task_hard]
        default: task_easy
      seed:
        type: integer
        default: 42
    returns: observation

  step:
    method: POST
    path: /step
    body:
      action:
        type: dict
    returns:
      observation: dict
      reward: float
      done: boolean
      info: dict

  state:
    method: GET
    path: /state
    returns: current episode state

  health:
    method: GET
    path: /health
    returns:
      status: string
      environment: string
      version: string

data_pipeline:
  pdf_ingest:
    method: POST
    path: /ingest/pdf
    description: Upload policy PDF, extract structured rules via LLM
  scan:
    method: POST
    path: /scan
    description: Run full compliance scan across all database records
  trend:
    method: GET
    path: /trend
    description: Compliance score history and deterioration alerts
  openenv_records:
    method: GET
    path: /openenv/records
    description: Records in OpenEnv format for Gargi merge
  openenv_rules:
    method: GET
    path: /openenv/rules
    description: Rules in OpenEnv format for Gargi merge

graders:
  task_easy:
    file: graders/task1_grader.py
    scoring: binary (0.0 or 1.0)
  task_medium:
    file: graders/task2_grader.py
    scoring: partial_credit
  task_hard:
    file: graders/task3_grader.py
    scoring: weighted_components

